server {
  listen 80;
  server_name app.bolaocopa.inovaflowtec.com.br 129.121.53.213 _;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name app.bolaocopa.inovaflowtec.com.br 129.121.53.213 _;

  ssl_certificate /etc/letsencrypt/live/app.bolaocopa.inovaflowtec.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.bolaocopa.inovaflowtec.com.br/privkey.pem;
  
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
